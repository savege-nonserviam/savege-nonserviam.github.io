name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check backend URL
        run: |
          if [ -z "$VITE_SERVER_URL" ]; then
            echo "::error::Set repository variable VITE_SERVER_URL to https://savege-nonserviamgithubio-production.up.railway.app"
            exit 1
          fi
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}

      - name: Build frontend
        run: npm run build
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
